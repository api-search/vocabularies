<form id="add-api-form" onsubmit="submitToGitHub(event)" style="max-width: 640px; margin: 1.5rem auto;">
  <div class="mb-3">
    <label for="api-name" class="form-label">API Name <span class="text-danger">*</span></label>
    <input type="text" class="form-control" id="api-name" placeholder="Stripe Payments API" required>
  </div>

  <div class="mb-3">
    <label for="api-url" class="form-label">APIs.json URL <span class="text-danger">*</span></label>
    <input type="url" class="form-control" id="api-url" placeholder="https://example.com/apis.json" required>
    <div class="form-text">A URL to a valid <a href="https://apisjson.org/" target="_blank" rel="noopener">APIs.json</a> file describing your API.</div>
  </div>

  <div class="mb-3">
    <label for="api-human-url" class="form-label">Documentation URL</label>
    <input type="url" class="form-control" id="api-human-url" placeholder="https://example.com/docs">
  </div>

  <div class="mb-3">
    <label for="api-provider" class="form-label">Provider / Organization</label>
    <input type="text" class="form-control" id="api-provider" placeholder="Stripe">
  </div>

  <div class="mb-3">
    <label for="api-tags" class="form-label">Tags</label>
    <input type="text" class="form-control" id="api-tags" placeholder="payments, billing, subscriptions">
    <div class="form-text">Comma-separated list of tags.</div>
  </div>

  <div class="mb-3">
    <label for="api-description" class="form-label">Description</label>
    <textarea class="form-control" id="api-description" rows="4" placeholder="A short description of what this API does..."></textarea>
  </div>

  <div class="mb-3">
    <label for="api-contact" class="form-label">Your Contact (optional)</label>
    <input type="text" class="form-control" id="api-contact" placeholder="@yourhandle or email">
  </div>

  <button type="submit" class="btn btn-primary">Submit via GitHub Issue</button>
  <p class="form-text mt-3">
    Submitting will open a pre-filled GitHub issue at <a href="https://github.com/api-search/network/issues" target="_blank" rel="noopener">api-search/network</a>. You'll need a GitHub account to complete the submission.
  </p>
</form>

<script>
function submitToGitHub(e) {
  e.preventDefault();
  var name = document.getElementById('api-name').value.trim();
  var url = document.getElementById('api-url').value.trim();
  var humanUrl = document.getElementById('api-human-url').value.trim();
  var provider = document.getElementById('api-provider').value.trim();
  var tags = document.getElementById('api-tags').value.trim();
  var description = document.getElementById('api-description').value.trim();
  var contact = document.getElementById('api-contact').value.trim();

  var title = 'Add API: ' + name;

  var body = '## API Submission\n\n';
  body += '**Name:** ' + name + '\n\n';
  body += '**APIs.json URL:** ' + url + '\n\n';
  if (humanUrl)    body += '**Documentation:** ' + humanUrl + '\n\n';
  if (provider)    body += '**Provider:** ' + provider + '\n\n';
  if (tags)        body += '**Tags:** ' + tags + '\n\n';
  if (description) body += '**Description:**\n\n' + description + '\n\n';
  if (contact)     body += '**Submitted by:** ' + contact + '\n\n';
  body += '---\n_Submitted via the [APIs.io add form]({{ site.url }}/add/)._';

  var issueUrl = 'https://github.com/api-search/network/issues/new'
    + '?title=' + encodeURIComponent(title)
    + '&body=' + encodeURIComponent(body)
    + '&labels=' + encodeURIComponent('api-submission');

  window.open(issueUrl, '_blank', 'noopener');
}
</script>
